version: "3.9"

services:
  rag-api:
    build: .
    image: customer-support-agent
    container_name: customer-support-api-cont

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./resources/shopeasy_policy.pdf:/app/resources/shopeasy_policy.pdf
      - ./utils/main.log:/var/log/main.log

    command: uvicorn main:app --host 0.0.0.0 --port 8000

    restart: no

  streamlit-app:
    build: .
    image: customer-support-agent
    container_name: customer-support-ui-cont

    ports:
      - "8501:8501"

    env_file:
      - .env

    depends_on:
      - rag-api

    volumes:
      - ./src/images/customer_support.png:/app/src/images/customer_support.png

    command: streamlit run frontend/frontend.py --server.address 0.0.0.0 --server.port 8501

    restart: no